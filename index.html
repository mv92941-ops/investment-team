<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投資團隊</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: #0f1117;
    color: #e2e8f0;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .header {
    background: #1a1d27;
    border-bottom: 1px solid #2d3148;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }
  .header-title { font-size: 18px; font-weight: 700; color: #f1f5f9; }
  .header-sub { font-size: 12px; color: #64748b; }

  /* Team members bar */
  .members-bar {
    background: #141620;
    border-bottom: 1px solid #2d3148;
    padding: 10px 20px;
    display: flex;
    gap: 10px;
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  .member-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    background: #1e2130;
    border: 1px solid #2d3148;
    border-radius: 20px;
    padding: 5px 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 13px;
    user-select: none;
  }
  .member-chip:hover { border-color: var(--color); background: #252840; }
  .member-chip.active { border-color: var(--color); background: #252840; box-shadow: 0 0 0 1px var(--color); }
  .member-chip .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--color); }
  .member-chip .name { color: #cbd5e1; font-weight: 500; }
  .member-chip .role { color: #64748b; font-size: 11px; }

  /* Chat area */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: #2d3148; border-radius: 2px; }

  /* Messages */
  .msg-user {
    display: flex;
    justify-content: flex-end;
  }
  .msg-user-bubble {
    background: #1d4ed8;
    color: #fff;
    border-radius: 16px 16px 4px 16px;
    padding: 10px 16px;
    max-width: 70%;
    font-size: 14px;
    line-height: 1.6;
  }

  .msg-agent {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    max-width: 85%;
  }
  .agent-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    background: #1e2130;
    border: 2px solid var(--color);
  }
  .agent-msg-wrap { display: flex; flex-direction: column; gap: 4px; }
  .agent-name-tag {
    font-size: 11px;
    font-weight: 600;
    color: var(--color);
    padding-left: 2px;
  }
  .agent-bubble {
    background: #1a1d27;
    border: 1px solid #2d3148;
    border-left: 3px solid var(--color);
    border-radius: 4px 16px 16px 16px;
    padding: 12px 16px;
    font-size: 14px;
    line-height: 1.7;
    color: #cbd5e1;
    white-space: pre-wrap;
  }

  /* Typing indicator */
  .typing-wrap { display: flex; gap: 10px; align-items: center; }
  .typing-indicator {
    display: flex;
    gap: 4px;
    padding: 12px 16px;
    background: #1a1d27;
    border: 1px solid #2d3148;
    border-radius: 16px;
  }
  .typing-dot {
    width: 6px; height: 6px;
    background: #64748b;
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* Input area */
  .input-area {
    background: #1a1d27;
    border-top: 1px solid #2d3148;
    padding: 12px 16px;
    flex-shrink: 0;
  }

  .mention-hint {
    font-size: 11px;
    color: #475569;
    margin-bottom: 8px;
    padding-left: 2px;
  }
  .mention-hint span {
    color: #64748b;
    cursor: pointer;
    padding: 1px 5px;
    border-radius: 3px;
    background: #1e2130;
    margin: 0 2px;
    transition: background 0.2s;
  }
  .mention-hint span:hover { background: #252840; color: #94a3b8; }

  .input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  textarea {
    flex: 1;
    background: #0f1117;
    border: 1px solid #2d3148;
    border-radius: 10px;
    color: #e2e8f0;
    padding: 10px 14px;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    min-height: 44px;
    max-height: 140px;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.5;
  }
  textarea:focus { border-color: #3b82f6; }
  textarea::placeholder { color: #475569; }

  .btn-send {
    background: #1d4ed8;
    border: none;
    border-radius: 10px;
    color: #fff;
    width: 44px;
    height: 44px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s;
    font-size: 18px;
  }
  .btn-send:hover { background: #2563eb; }
  .btn-send:disabled { background: #2d3148; cursor: not-allowed; }

  .btn-review {
    background: #7c3aed;
    border: none;
    border-radius: 10px;
    color: #fff;
    padding: 0 14px;
    height: 44px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    flex-shrink: 0;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .btn-review:hover { background: #6d28d9; }

  .btn-clear {
    background: transparent;
    border: 1px solid #2d3148;
    border-radius: 10px;
    color: #64748b;
    padding: 0 12px;
    height: 44px;
    cursor: pointer;
    font-size: 12px;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .btn-clear:hover { border-color: #475569; color: #94a3b8; }

  /* Review Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: #1a1d27;
    border: 1px solid #2d3148;
    border-radius: 16px;
    padding: 24px;
    width: 440px;
    max-width: 95vw;
  }
  .modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .modal p { font-size: 12px; color: #64748b; margin-bottom: 20px; }
  .form-row { margin-bottom: 14px; }
  .form-row label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 6px; }
  .form-row input, .form-row select, .form-row textarea {
    width: 100%;
    background: #0f1117;
    border: 1px solid #2d3148;
    border-radius: 8px;
    color: #e2e8f0;
    padding: 9px 12px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
  }
  .form-row input:focus, .form-row select:focus, .form-row textarea:focus {
    border-color: #7c3aed;
  }
  .form-row select option { background: #1a1d27; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
  .modal-actions button {
    padding: 8px 20px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    border: none;
  }
  .btn-cancel { background: #2d3148; color: #94a3b8; }
  .btn-submit { background: #7c3aed; color: #fff; font-weight: 600; }
  .btn-cancel:hover { background: #374151; }
  .btn-submit:hover { background: #6d28d9; }

  /* Lesson save button */
  .btn-save-lesson {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #1e2130;
    border: 1px dashed #F97316;
    border-radius: 8px;
    color: #F97316;
    padding: 7px 14px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    margin-top: 10px;
    transition: all 0.2s;
  }
  .btn-save-lesson:hover { background: #2a1f10; }

  /* Lessons panel */
  .lessons-panel {
    width: 340px;
    max-height: 80vh;
    overflow-y: auto;
  }
  .lesson-item {
    background: #0f1117;
    border: 1px solid #2d3148;
    border-left: 3px solid #F97316;
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 10px;
    position: relative;
  }
  .lesson-item .lesson-meta { font-size: 11px; color: #64748b; margin-bottom: 6px; }
  .lesson-item .lesson-text { font-size: 13px; color: #cbd5e1; line-height: 1.6; }
  .lesson-item .lesson-owner { font-size: 11px; color: #F97316; margin-top: 6px; }
  .lesson-item .btn-del {
    position: absolute; top: 8px; right: 8px;
    background: none; border: none; color: #475569;
    cursor: pointer; font-size: 14px; padding: 2px 6px;
    border-radius: 4px;
  }
  .lesson-item .btn-del:hover { color: #ef4444; background: #1a1d27; }
  .no-lessons { text-align: center; color: #475569; padding: 30px; font-size: 13px; }

  /* Welcome */
  .welcome {
    text-align: center;
    padding: 40px 20px;
    color: #475569;
  }
  .welcome .icon { font-size: 48px; margin-bottom: 16px; }
  .welcome h2 { font-size: 18px; color: #94a3b8; margin-bottom: 8px; }
  .welcome p { font-size: 13px; line-height: 1.8; }
  .welcome .tag {
    display: inline-block;
    background: #1e2130;
    border: 1px solid #2d3148;
    border-radius: 6px;
    padding: 3px 10px;
    font-size: 12px;
    margin: 3px;
    color: #64748b;
  }
</style>
</head>
<body>

<div class="header">
  <div style="flex:1">
    <div class="header-title">📈 投資團隊</div>
    <div class="header-sub">台股 · 微型台指 · 五人策略委員會</div>
  </div>
  <button onclick="openLessons()" style="background:#1e2130;border:1px solid #2d3148;border-radius:8px;color:#F97316;padding:6px 14px;cursor:pointer;font-size:12px;font-weight:600;">
    📚 教訓紀錄 <span id="lessonCount" style="background:#F97316;color:#000;border-radius:10px;padding:1px 6px;font-size:11px;margin-left:4px;">0</span>
  </button>
</div>

<div class="members-bar">
  <div class="member-chip" style="--color:#3B82F6" onclick="toggleMention('資料酷')" id="chip-資料酷">
    <div class="dot"></div>
    <span>📊</span>
    <span class="name">資料酷</span>
    <span class="role">資料・標的</span>
  </div>
  <div class="member-chip" style="--color:#8B5CF6" onclick="toggleMention('策略王')" id="chip-策略王">
    <div class="dot"></div>
    <span>🧠</span>
    <span class="name">策略王</span>
    <span class="role">策略・規劃</span>
  </div>
  <div class="member-chip" style="--color:#EF4444" onclick="toggleMention('風控師')" id="chip-風控師">
    <div class="dot"></div>
    <span>🛡️</span>
    <span class="name">風控師</span>
    <span class="role">進出場・風控</span>
  </div>
  <div class="member-chip" style="--color:#10B981" onclick="toggleMention('財務長')" id="chip-財務長">
    <div class="dot"></div>
    <span>💰</span>
    <span class="name">財務長</span>
    <span class="role">資金・成本</span>
  </div>
  <div class="member-chip" style="--color:#F97316" onclick="toggleMention('強心臟')" id="chip-強心臟">
    <div class="dot"></div>
    <span>💪</span>
    <span class="name">強心臟</span>
    <span class="role">心態・紀律</span>
  </div>
</div>

<div class="chat-area" id="chatArea">
  <div class="welcome" id="welcome">
    <div class="icon">🤝</div>
    <h2>你好，老闆</h2>
    <p>
      你的投資團隊已就位。<br>
      拋出任何議題，我們來討論。<br><br>
      <span class="tag">台股選股</span>
      <span class="tag">大盤方向</span>
      <span class="tag">進出場點位</span>
      <span class="tag">資金配置</span>
      <span class="tag">交易檢討</span>
    </p>
  </div>
</div>

<div class="input-area">
  <div class="mention-hint" id="mentionHint">
    點選成員直接問他：
    <span onclick="toggleMention('資料酷')">@資料酷</span>
    <span onclick="toggleMention('策略王')">@策略王</span>
    <span onclick="toggleMention('風控師')">@風控師</span>
    <span onclick="toggleMention('財務長')">@財務長</span>
  </div>
  <div class="input-row">
    <textarea id="msgInput" placeholder="說說你的想法..." rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="btn-review" onclick="openModal()">📋 交易檢討</button>
    <button class="btn-send" id="sendBtn" onclick="sendMessage()">➤</button>
    <button class="btn-clear" onclick="clearChat()">清除</button>
  </div>
</div>

<!-- Save Lesson Modal -->
<div class="modal-overlay" id="saveLessonModal">
  <div class="modal">
    <h3>💾 儲存教訓</h3>
    <p>記錄這次檢討的關鍵教訓，下次交易前自動提醒你</p>

    <div class="form-row">
      <label>標的</label>
      <div class="two-col">
        <input id="sl-symbol" placeholder="如：台指期、2330">
        <select id="sl-type">
          <option value="台股">台股</option>
          <option value="微型台指">微型台指</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <label>教訓內容（具體說出做錯了什麼）</label>
      <textarea id="sl-lesson" rows="3" placeholder="例：停損沒有確實執行，虧損擴大到原本的3倍"></textarea>
    </div>

    <div class="form-row">
      <label>下次由誰提醒</label>
      <select id="sl-owner">
        <option value="強心臟">💪 強心臟（心態・紀律問題）</option>
        <option value="風控師">🛡️ 風控師（進出場・點位問題）</option>
        <option value="策略王">🧠 策略王（策略方向問題）</option>
        <option value="資料酷">📊 資料酷（資料判斷問題）</option>
        <option value="財務長">💰 財務長（資金配置問題）</option>
      </select>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeSaveLesson()">取消</button>
      <button class="btn-submit" onclick="submitLesson()">儲存教訓</button>
    </div>
  </div>
</div>

<!-- Lessons List Modal -->
<div class="modal-overlay" id="lessonsModal">
  <div class="modal lessons-panel">
    <h3 style="margin-bottom:4px">📚 教訓紀錄</h3>
    <p>每次新交易時，負責人員會自動提醒你</p>
    <div id="lessonsList"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeLessons()">關閉</button>
    </div>
  </div>
</div>

<!-- Trade Review Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>📋 交易檢討</h3>
    <p>輸入你的交易紀錄，讓四位成員幫你分析</p>

    <div class="form-row">
      <label>標的</label>
      <div class="two-col">
        <select id="r-type">
          <option value="台股">台股個股</option>
          <option value="微型台指">微型台指</option>
        </select>
        <input id="r-symbol" placeholder="代號 / 名稱（如 2330）">
      </div>
    </div>

    <div class="form-row">
      <label>買進</label>
      <div class="two-col">
        <input id="r-buy-price" placeholder="買進價格 / 點位" type="number">
        <input id="r-buy-date" placeholder="日期（如 3/25）">
      </div>
    </div>

    <div class="form-row">
      <label>賣出</label>
      <div class="two-col">
        <input id="r-sell-price" placeholder="賣出價格 / 點位" type="number">
        <input id="r-sell-date" placeholder="日期（如 3/26）">
      </div>
    </div>

    <div class="form-row">
      <div class="two-col">
        <div>
          <label>口數 / 張數</label>
          <input id="r-size" placeholder="例：1口 / 1張" type="number">
        </div>
        <div>
          <label>結果</label>
          <select id="r-result">
            <option value="獲利">獲利出場</option>
            <option value="虧損">虧損出場</option>
            <option value="停損">觸停損出場</option>
            <option value="停利">觸停利出場</option>
          </select>
        </div>
      </div>
    </div>

    <div class="form-row">
      <label>當時的想法或備註</label>
      <textarea id="r-note" rows="2" placeholder="進場理由、當時盤面狀況等..."></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-submit" onclick="submitReview()">送出給團隊檢討</button>
    </div>
  </div>
</div>

<script>
const COLORS = {
  "資料酷": "#3B82F6",
  "策略王": "#8B5CF6",
  "風控師": "#EF4444",
  "財務長": "#10B981",
  "強心臟": "#F97316"
};
const EMOJIS = {
  "資料酷": "📊",
  "策略王": "🧠",
  "風控師": "🛡️",
  "財務長": "💰",
  "強心臟": "💪"
};

let mentionedAgent = null;
let isLoading = false;

function toggleMention(name) {
  if (mentionedAgent === name) {
    mentionedAgent = null;
    document.getElementById('chip-' + name).classList.remove('active');
    document.getElementById('mentionHint').style.color = '';
  } else {
    if (mentionedAgent) {
      document.getElementById('chip-' + mentionedAgent).classList.remove('active');
    }
    mentionedAgent = name;
    document.getElementById('chip-' + name).classList.add('active');
    document.getElementById('mentionHint').innerHTML = `<span style="color:${COLORS[name]}">@${name}</span> 將優先回應`;
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function scrollBottom() {
  const area = document.getElementById('chatArea');
  area.scrollTop = area.scrollHeight;
}

function addUserMsg(text) {
  document.getElementById('welcome')?.remove();
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'msg-user';
  div.innerHTML = `<div class="msg-user-bubble">${escHtml(text)}</div>`;
  area.appendChild(div);
  scrollBottom();
}

function showTyping(name) {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'msg-agent';
  div.id = 'typing-' + name;
  div.style = `--color:${COLORS[name]}`;
  div.innerHTML = `
    <div class="agent-avatar">${EMOJIS[name]}</div>
    <div class="agent-msg-wrap">
      <div class="agent-name-tag">${name}</div>
      <div class="typing-indicator">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>`;
  area.appendChild(div);
  scrollBottom();
  return div;
}

function replaceTyping(name, content) {
  const el = document.getElementById('typing-' + name);
  if (el) {
    el.querySelector('.agent-msg-wrap').innerHTML = `
      <div class="agent-name-tag">${name}</div>
      <div class="agent-bubble">${escHtml(content)}</div>`;
  }
  scrollBottom();
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

async function sendMessage(customMsg, isReview) {
  const input = document.getElementById('msgInput');
  const msg = customMsg || input.value.trim();
  if (!msg || isLoading) return;

  isLoading = true;
  document.getElementById('sendBtn').disabled = true;

  addUserMsg(msg);
  if (!customMsg) {
    input.value = '';
    input.style.height = 'auto';
  }

  const mentioned = mentionedAgent;

  try {
    // Show typing for first agent immediately
    const typingEls = {};

    const body = {
      message: msg,
      mentioned: mentioned,
      is_review: !!isReview
    };

    // Show a loading indicator
    const loadDiv = document.createElement('div');
    loadDiv.id = 'globalTyping';
    loadDiv.style.cssText = 'padding:8px 20px; color:#475569; font-size:13px;';
    loadDiv.textContent = '團隊正在討論中...';
    document.getElementById('chatArea').appendChild(loadDiv);
    scrollBottom();

    const res = await fetch('/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body)
    });

    document.getElementById('globalTyping')?.remove();

    const data = await res.json();

    for (const r of data.responses) {
      const typing = showTyping(r.agent);
      await sleep(300);
      replaceTyping(r.agent, r.content);
      await sleep(200);
    }

    // Reset mention after response
    if (mentioned) {
      toggleMention(mentioned);
    }

  } catch (e) {
    document.getElementById('globalTyping')?.remove();
    const area = document.getElementById('chatArea');
    const div = document.createElement('div');
    div.style.cssText = 'color:#ef4444;font-size:13px;padding:8px 16px;';
    div.textContent = '連線錯誤，請確認伺服器是否啟動';
    area.appendChild(div);
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function clearChat() {
  await fetch('/clear', {method:'POST'});
  const area = document.getElementById('chatArea');
  area.innerHTML = `<div class="welcome" id="welcome">
    <div class="icon">🤝</div>
    <h2>對話已清除</h2>
    <p>開始新的討論吧</p>
  </div>`;
  mentionedAgent = null;
  ['資料酷','策略王','風控師','財務長','強心臟'].forEach(n => {
    document.getElementById('chip-' + n).classList.remove('active');
  });
  document.getElementById('mentionHint').innerHTML = `點選成員直接問他：
    <span onclick="toggleMention('資料酷')">@資料酷</span>
    <span onclick="toggleMention('策略王')">@策略王</span>
    <span onclick="toggleMention('風控師')">@風控師</span>
    <span onclick="toggleMention('財務長')">@財務長</span>`;
}

function openModal() {
  document.getElementById('modal').classList.add('show');
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
}

async function submitReview() {
  const type = document.getElementById('r-type').value;
  const symbol = document.getElementById('r-symbol').value;
  const buyPrice = document.getElementById('r-buy-price').value;
  const buyDate = document.getElementById('r-buy-date').value;
  const sellPrice = document.getElementById('r-sell-price').value;
  const sellDate = document.getElementById('r-sell-date').value;
  const size = document.getElementById('r-size').value;
  const result = document.getElementById('r-result').value;
  const note = document.getElementById('r-note').value;

  if (!buyPrice || !sellPrice) {
    alert('請填入買進和賣出點位');
    return;
  }

  const diff = type === '微型台指'
    ? `${Math.abs(sellPrice - buyPrice)}點（損益約 ${Math.abs(sellPrice - buyPrice) * 50 * (size || 1)} 元）`
    : `${((sellPrice - buyPrice) / buyPrice * 100).toFixed(2)}%`;

  const msg = `【交易檢討】
標的：${type} ${symbol || ''}
買進：${buyPrice}${buyDate ? '（' + buyDate + '）' : ''}
賣出：${sellPrice}${sellDate ? '（' + sellDate + '）' : ''}
口數/張數：${size || 1}
結果：${result}，差距 ${diff}
${note ? '備註：' + note : ''}

請四位成員幫我從各自的專業角度檢討這筆交易。`;

  const reviewData = { symbol, type };
  closeModal();
  await sendMessage(msg, true);
  showSaveLessonBtn(reviewData);
}

// Click outside modal to close
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.getElementById('saveLessonModal').addEventListener('click', function(e) {
  if (e.target === this) closeSaveLesson();
});
document.getElementById('lessonsModal').addEventListener('click', function(e) {
  if (e.target === this) closeLessons();
});

// Save lesson
let currentReviewData = null;

function showSaveLessonBtn(reviewData) {
  currentReviewData = reviewData;
  const area = document.getElementById('chatArea');
  const existing = document.getElementById('saveLessonBtn');
  if (existing) existing.remove();
  const btn = document.createElement('div');
  btn.id = 'saveLessonBtn';
  btn.style.cssText = 'display:flex;justify-content:flex-end;padding:0 4px;';
  btn.innerHTML = `<button class="btn-save-lesson" onclick="openSaveLesson()">💾 儲存這次教訓，下次提醒我</button>`;
  area.appendChild(btn);
  scrollBottom();
}

function openSaveLesson() {
  if (currentReviewData) {
    document.getElementById('sl-symbol').value = currentReviewData.symbol || '';
    document.getElementById('sl-type').value = currentReviewData.type || '台股';
  }
  document.getElementById('saveLessonModal').classList.add('show');
}

function closeSaveLesson() {
  document.getElementById('saveLessonModal').classList.remove('show');
}

async function submitLesson() {
  const lesson = document.getElementById('sl-lesson').value.trim();
  if (!lesson) { alert('請填入教訓內容'); return; }

  const data = {
    symbol: document.getElementById('sl-symbol').value || '通用',
    type: document.getElementById('sl-type').value,
    lesson: lesson,
    owner: document.getElementById('sl-owner').value
  };

  await fetch('/save-lesson', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  });

  closeSaveLesson();
  document.getElementById('saveLessonBtn')?.remove();
  await updateLessonCount();

  // Show confirmation in chat
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.style.cssText = 'text-align:center;padding:8px;font-size:12px;color:#F97316;';
  div.textContent = `✓ 教訓已儲存，下次交易時 ${data.owner} 會提醒你`;
  area.appendChild(div);
  scrollBottom();

  document.getElementById('sl-lesson').value = '';
}

async function updateLessonCount() {
  const res = await fetch('/lessons');
  const data = await res.json();
  document.getElementById('lessonCount').textContent = data.lessons.length;
}

async function openLessons() {
  const res = await fetch('/lessons');
  const data = await res.json();
  const list = document.getElementById('lessonsList');

  if (data.lessons.length === 0) {
    list.innerHTML = '<div class="no-lessons">尚無紀錄<br>完成交易檢討後可儲存教訓</div>';
  } else {
    list.innerHTML = data.lessons.slice().reverse().map(l => `
      <div class="lesson-item" id="lesson-${l.id}">
        <button class="btn-del" onclick="deleteLesson(${l.id})">✕</button>
        <div class="lesson-meta">${l.date} · ${l.type} ${l.symbol}</div>
        <div class="lesson-text">${escHtml(l.lesson)}</div>
        <div class="lesson-owner">由 ${l.owner} 負責提醒</div>
      </div>`).join('');
  }

  document.getElementById('lessonsModal').classList.add('show');
}

function closeLessons() {
  document.getElementById('lessonsModal').classList.remove('show');
}

async function deleteLesson(id) {
  await fetch(`/lessons/${id}`, { method: 'DELETE' });
  document.getElementById('lesson-' + id)?.remove();
  await updateLessonCount();
  const list = document.getElementById('lessonsList');
  if (!list.querySelector('.lesson-item')) {
    list.innerHTML = '<div class="no-lessons">尚無紀錄</div>';
  }
}

// Init
updateLessonCount();
</script>
